analyze_task:
  description: >
    Vaga: {job_description}

    CVs disponíveis: {cvs_content}

    INSTRUCOES:
    1. Le a vaga e identifica os requisitos obrigatorios e desajaveis
    2. Analisa APENAS os CVs fornecidos - NUNCA inventes candidatos
    3. Para cada candidato extrai o email exacto do CV

    4. Calcula o score para cada candidato:

    FORMACAO (maximo 15): Licenciatura exacta=15, area relacionada=8, diferente=0
    SKILLS OBRIGATORIAS (maximo 25): comeca em 25, desconta 1.5 por cada skill ausente
    SKILLS DESAJAVEIS (maximo 15): proporcional ao numero presente
    EXPERIENCIA (maximo 35): nenhuma=0, fraca=8, transferivel=15, adequada=25, supera=35
    SOFT SKILLS (maximo 5)
    BONUS (maximo 5)

    CLASSIFICACAO: 75-100=Forte candidato, 50-74=Aceitavel, 25-49=Fraco, 0-24=Nao recomendado
    Inclui APENAS candidatos com score >= 45 no ranking.

    NAO USES markdown, asteriscos nem formatacao especial. Texto simples apenas.

    Formato obrigatorio do output — APENAS ISTO, nada mais:

    RANKING FINAL
    [posicao]. [nome] - [score]/100 - [classificacao]
    Email CV: [email]
    Formacao: [valor]/15
    Skills obrigatorias: [valor]/25 (ausentes: [lista])
    Skills desajaveis: [valor]/15 (presentes: [lista])
    Experiencia: [valor]/35
    Soft skills: [valor]/5
    Bonus: [valor]/5
    Soma: [a]+[b]+[c]+[d]+[e]+[f] = [total]
    Pontos fortes: [2-3 pontos maximos]
    Pontos fracos: [1-2 pontos maximos]
    ---

  expected_output: Ranking final conciso apenas com os campos obrigatorios, sem a analise detalhada intermédia, emails reais, apenas candidatos >= 45, sem markdown
  agent: cv_analyzer

email_task:
  description: >
    Com base no ranking anterior, redige emails para os top 5 candidatos com score >= 45.
    Se houver menos de 5, rediges apenas os que existem.
    NUNCA cries emails para candidatos que nao estao no ranking.

    O email esta no campo "Email CV" do ranking. USA ESSE EMAIL EXACTO.

    Para cada candidato:
    - Menciona apenas 1 ponto forte
    - NUNCA menciones scores, pontuacoes nem pontos fracos
    - Convida para entrevista sem data definida
    - Tom profissional e breve - maximo 3 paragrafos
    - Assina como "Equipa de Recrutamento - {empresa}"

    NAO USES markdown, asteriscos nem formatacao especial. Texto simples apenas.

    Output OBRIGATORIO com estas duas seccoes exactas:

    SECCAO 1 - RELATORIO:
    [copia aqui o RANKING FINAL completo]

    SECCAO 2 - EMAILS:
    CANDIDATO: [nome]
    EMAIL: [email exacto]
    ASSUNTO: [assunto]
    CORPO: [corpo]
    ---

  expected_output: SECCAO 1 com ranking completo seguido de SECCAO 2 com emails simples
  agent: email_writer
